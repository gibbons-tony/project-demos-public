---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-api-deployment
  namespace: w255
  labels:
    app: mlapi
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mlapi
  template:
    metadata:
      labels:
        app: mlapi
    spec:
      containers:
        - name: mlapi-container
          image: project:latest
          env:
            - name: REDIS_URL
              value: redis-service
          resources:
            requests:
              cpu: 1000m
              memory: 2000Mi
            limits:
              cpu: 3000m
              memory: 3000Mi
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              scheme: HTTP
              path: /project/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              scheme: HTTP
              path: /project/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          startupProbe:
            httpGet:
              scheme: HTTP
              path: /project/health
              port: 8000
            failureThreshold: 30
            periodSeconds: 10
      initContainers:
        - name: init-verify-redis-service-dns
          image: busybox:1.37
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          command:
            [
              "sh",
              "-c",
              "until nc -vz redis-service 6379; do echo 'waiting for redis service from DNS'; sleep 2; done",
            ]
        - name: init-verify-redis-ready
          image: busybox:1.37
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          command:
            [
              "sh",
              "-c",
              "until (printf 'PING\r\n';) | nc redis-service 6379; do echo 'waiting for redis to PONG'; sleep 1; done",
            ]