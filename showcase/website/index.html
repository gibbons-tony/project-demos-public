    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --dark: #2d3748;
            --light: #f7fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            padding: 40px 0;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.95;
        }

        .notebook-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .notebook-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .notebook-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .notebook-card h3 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 1.4em;
        }

        .project-type {
            display: inline-block;
            padding: 4px 10px;
            background: var(--light);
            color: var(--dark);
            border-radius: 20px;
            font-size: 0.85em;
            margin-bottom: 15px;
        }

        .metrics {
            margin: 15px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .metrics h4 {
            color: var(--dark);
            margin-bottom: 8px;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .metric-item {
            display: inline-block;
            margin: 5px 10px 5px 0;
            padding: 5px 10px;
            background: white;
            border-radius: 5px;
            font-size: 0.9em;
        }

        .metric-value {
            font-weight: bold;
            color: var(--primary);
        }

        .view-options {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .view-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.3s;
            font-weight: 500;
        }

        .view-btn:hover {
            background: var(--secondary);
        }

        .view-btn.secondary {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .view-btn.secondary:hover {
            background: var(--primary);
            color: white;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 60px;
            padding: 20px;
        }

        footer a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

        // Function to create notebook cards
        function createNotebookCard(notebook) {
            const card = document.createElement('div');
            card.className = 'notebook-card';

            // Format name
            const displayName = notebook.name
                .replace(/_/g, ' ')
                .replace(/\b\w/g, c => c.toUpperCase());

            // Build metrics HTML
            let metricsHtml = '';
            if (notebook.metrics && Object.keys(notebook.metrics).length > 0) {
                metricsHtml = '<div class="metrics"><h4>Performance Metrics</h4>';
                for (const [key, value] of Object.entries(notebook.metrics)) {
                    const formattedValue = value < 1 ? (value * 100).toFixed(1) + '%' : value.toFixed(3);
                    metricsHtml += `<span class="metric-item">${key}: <span class="metric-value">${formattedValue}</span></span>`;
                }
                metricsHtml += '</div>';
            }

            card.innerHTML = `
                <h3>${displayName}</h3>
                <span class="project-type">${notebook.type}</span>
                ${metricsHtml}
                <div class="view-options">
                    <a href="${notebook.htmlPath}" class="view-btn" target="_blank">View HTML</a>
                    <a href="${notebook.notebookPath}" class="view-btn secondary" target="_blank">Clean Notebook</a>
                </div>
            `;

            return card;
        }

        // Populate the grid
        const grid = document.getElementById('notebook-grid');
        notebooks.forEach(notebook => {
            grid.appendChild(createNotebookCard(notebook));
